version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: email_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
      - db

  beat:
    build: ./backend
    command: celery -A app.worker.celery_app beat --loglevel=INFO
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: